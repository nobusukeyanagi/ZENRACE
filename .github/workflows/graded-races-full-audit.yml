name: Full graded-race audit

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "再点検開始日 YYYY-MM-DD"
        required: true
        default: "2026-01-01"
        type: string
      end_date:
        description: "再点検終了日 YYYY-MM-DD（空欄は実行日+45日）"
        required: false
        type: string
      chunk_days:
        description: "1回に確認する日数"
        required: true
        default: "31"
        type: string

concurrency:
  group: graded-races-full-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Recheck official race information
    runs-on: ubuntu-latest
    timeout-minutes: 120

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: write
      pages: write
      id-token: write

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: gradedraces/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r gradedraces/requirements.txt

      - name: Recheck from January 2026
        working-directory: gradedraces
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          CHUNK_DAYS: ${{ inputs.chunk_days }}
        run: |
          ARGS=(
            --start "$START_DATE"
            --chunk-days "$CHUNK_DAYS"
          )
          if [ -n "$END_DATE" ]; then
            ARGS+=(--end "$END_DATE")
          fi
          python -m scripts.audit_since_2026 "${ARGS[@]}"

      - name: Validate JSON
        working-directory: gradedraces
        run: python -m scripts.validate_races races.json

      - name: Embed JSON into HTML
        working-directory: gradedraces
        run: |
          python -m scripts.sync_html             --json races.json             --html graded_races_schedule.html
          cp graded_races_schedule.html index.html

      - name: Commit audited source files
        run: |
          git config user.name "graded-races-bot"
          git config user.email "graded-races-bot@users.noreply.github.com"
          git add             gradedraces/races.json             gradedraces/graded_races_schedule.html             gradedraces/index.html             gradedraces/grade_normalization_report.json             gradedraces/full_audit_report.json
          [ -f gradedraces/changes.json ] && git add gradedraces/changes.json || true
          [ -f gradedraces/source_status.json ] && git add gradedraces/source_status.json || true
          if git diff --cached --quiet; then
            echo "再点検による変更はありません。"
          else
            git commit -m "Recheck graded races from 2026-01"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Prepare Pages files
        run: |
          rm -rf _site
          mkdir -p _site/gradedraces _site/shared
          cp index.html _site/index.html
          cp shared/bottom-nav.js _site/shared/bottom-nav.js
          cp gradedraces/index.html _site/gradedraces/index.html
          cp gradedraces/graded_races_schedule.html _site/gradedraces/graded_races_schedule.html
          cp gradedraces/races.json _site/gradedraces/races.json
          if [ -d gradedraces/icons ]; then
            cp -R gradedraces/icons _site/gradedraces/icons
          fi
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: graded-race-full-audit-report
          path: |
            gradedraces/full_audit_report.json
            gradedraces/grade_normalization_report.json
            gradedraces/changes.json
            gradedraces/source_status.json
          if-no-files-found: ignore
          retention-days: 30
